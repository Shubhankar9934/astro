# MkDocs → https://mlwithshubh.me/astro/  (folder on your root GitHub Pages repo, e.g. *.github.io)
#
# peaceiris: with destination_dir set, the DEFAULT is to delete existing files *only under*
# that folder, then copy ./site there. Socio_Sim_AI/ and other siblings stay intact.
# keep_files: true was WRONG here — it left old README / markdown next to MkDocs index.html,
# so the site kept showing the long “Project Astro – Technical Overview” text instead of Material.
#
# Required on this repo: Secret GH_PAGES_DEPLOY_TOKEN = PAT with Contents: write on the site repo.
# Optional variables: PAGES_ROOT_REPO, PAGES_ROOT_BRANCH (defaults below).

name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt
      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Push site to root Pages repo (replaces astro/ only)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
          external_repository: ${{ vars.PAGES_ROOT_REPO != '' && vars.PAGES_ROOT_REPO || 'Shubhankar9934/Shubhankar9934.github.io' }}
          publish_branch: ${{ vars.PAGES_ROOT_BRANCH != '' && vars.PAGES_ROOT_BRANCH || 'main' }}
          publish_dir: ./site
          destination_dir: astro
          # default keep_files: false → clear destination_dir before deploy; does NOT delete /Socio_Sim_AI/
