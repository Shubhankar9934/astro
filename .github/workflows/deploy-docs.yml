# GitHub Pages via Actions — one job (upload + deploy in same runner; avoids artifact handoff issues).
#
# First-time setup (or you get 404):
#   1. Repo → Settings → Pages → Build and deployment → Source: GitHub Actions (not "Deploy from a branch").
#   2. Repo → Settings → Actions → General → Workflow permissions: allow "Read and write" if deploy fails on permissions.
#   3. Run "Deploy documentation" in Actions (or push to main). Wait for green check, then open site_url from mkdocs.yml.

name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt
      - name: Build MkDocs site
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
