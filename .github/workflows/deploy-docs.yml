# Publishes MkDocs output to the orphan branch `gh-pages`.
# Works with the classic Pages UI (no deploy-pages API / no “enable Actions publisher” step).
#
# GitHub setup:
#   1. Repo → Settings → Pages → Build and deployment → Source: Deploy from a branch
#   2. Branch: gh-pages  ·  Folder: / (root)  ·  Save
#   3. Settings → Actions → General → Workflow permissions: Read and write (needed to push gh-pages)
#   4. Push to main (or run this workflow manually). Site: https://<user>.github.io/<repo>/

name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt
      - name: Build MkDocs site
        run: mkdocs build --strict
      - name: Push site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
