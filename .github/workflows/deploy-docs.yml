# Publishes MkDocs output to the orphan branch `gh-pages`.
#
# If https://<user>.github.io/<repo>/ shows “There isn't a GitHub Pages site here” AFTER
# this workflow is green: Pages is still using the wrong *source*. You MUST use the branch,
# not GitHub Actions:
#   Settings → Pages → Build and deployment → Source: Deploy from a branch
#   Branch: gh-pages  ·  Folder: / (root)  ·  Save
# If Source stays “GitHub Actions”, GitHub never serves gh-pages (404).
#
# Also: Settings → Actions → General → Workflow permissions: Read and write (to push gh-pages).

name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt
      - name: Build MkDocs site
        run: mkdocs build --strict
      - name: Push site to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
