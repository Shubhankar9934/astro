# mlwithshubh.me/astro/  = root Pages repo (e.g. *.github.io) → folder astro/
#
# peaceiris needs a *personal* PAT to push to another repo; GITHUB_TOKEN cannot.
# Error "not found deploy key or tokens" = secret GH_PAGES_DEPLOY_TOKEN is missing/empty
# or DEPLOY_ROOT_SITE is true but the secret was never added.
#
# Enable root deploy (BOTH required):
#   1. Repo variable DEPLOY_ROOT_SITE = true
#   2. Repo secret GH_PAGES_DEPLOY_TOKEN = PAT with Contents: Read+Write on the site repo
# Optional: PAGES_ROOT_REPO, PAGES_ROOT_BRANCH (defaults below).
#
# If DEPLOY_ROOT_SITE is not "true", we only push to this repo’s gh-pages (no PAT needed).

name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt
      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Push to root site repo (mlwithshubh.me/astro/)
        if: vars.DEPLOY_ROOT_SITE == 'true' || vars.DEPLOY_ROOT_SITE == 'True'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
          external_repository: ${{ vars.PAGES_ROOT_REPO != '' && vars.PAGES_ROOT_REPO || 'Shubhankar9934/Shubhankar9934.github.io' }}
          publish_branch: ${{ vars.PAGES_ROOT_BRANCH != '' && vars.PAGES_ROOT_BRANCH || 'main' }}
          publish_dir: ./site
          destination_dir: astro

      - name: Push to this repo gh-pages only
        if: vars.DEPLOY_ROOT_SITE != 'true' && vars.DEPLOY_ROOT_SITE != 'True'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true

      # If mlwithshubh.me/astro still shows the old README page, read this block in the log.
      - name: Which URL did this run update?
        if: always()
        run: |
          echo "========== Deploy documentation — which site was updated? =========="
          echo "DEPLOY_ROOT_SITE='${{ vars.DEPLOY_ROOT_SITE }}' (must be true/True to update mlwithshubh.me)"
          echo "External target: ${{ vars.PAGES_ROOT_REPO != '' && vars.PAGES_ROOT_REPO || 'Shubhankar9934/Shubhankar9934.github.io' }} @ branch ${{ vars.PAGES_ROOT_BRANCH != '' && vars.PAGES_ROOT_BRANCH || 'main' }} → folder astro/"
          if [ "${{ vars.DEPLOY_ROOT_SITE }}" = "true" ] || [ "${{ vars.DEPLOY_ROOT_SITE }}" = "True" ]; then
            echo "This run SHOULD have updated mlwithshubh.me/astro/ (if PAT + branch + Pages settings match)."
          else
            echo "This run ONLY updated THIS repo's gh-pages → use https://shubhankar9934.github.io/astro/ if Pages is enabled here."
            echo "mlwithshubh.me/astro/ will NOT change until you set variable DEPLOY_ROOT_SITE=true (or True) AND secret GH_PAGES_DEPLOY_TOKEN."
          fi
          echo "On the *site* repo: Settings → Pages → Branch must equal publish branch above; Folder should be / (root), not /docs only."
          echo "======================================================================="
